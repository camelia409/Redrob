cross_encoder:
  enabled: true
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_n_to_rerank: 500
  batch_size: 64
  # Blending: final = beta * cross_encoder_score_normalized + (1-beta) * rrf_prior_score_normalized
  # beta=1.0 = pure cross-encoder ordering, beta=0.0 = ignore cross-encoder (bypass)
  # 0.7 leans cross-encoder while preserving RRF signal
  beta: 0.7
