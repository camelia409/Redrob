# Hand-designed weights for the first weighted-sum re-ranker (Milestone 11).
# Weights are signed and intentionally do NOT sum to 1.
# See DECISIONS.md for the correlation evidence behind each sign.

weights_v1:
  # Family 1 (semantic) — moderate: raw scores + rank agreement
  bm25_score_normalized: 0.10
  dense_v2_score: 0.03
  bm25_rank_within_union: 0.08
  dense_v2_rank_within_union: 0.06
  bm25_dense_rank_agreement: 0.05
  # Family 2 (skills) — CAREFUL: strict is negative, broad is neutral
  strict_ml_skill_count_capped: -0.05    # yes, negative — that's the finding
  broad_ml_skill_count_capped: 0.02
  max_skill_proficiency_ml: 0.05
  mean_skill_duration_months_ml_capped: 0.10
  # Family 3 (career trajectory)
  yoe_in_ideal_band: 0.12
  tech_role_fraction: 0.08
  ml_role_fraction: 0.06
  career_direction_bonus: 0.05
  mean_tenure_months_capped: 0.03
  # Family 4 (production evidence)
  career_production_phrase_count_capped: 0.10
  career_ml_system_phrase_count_capped: 0.02
  product_company_flag: 0.05
  consulting_only_flag: -0.05
  # Family 5 (behavioral)
  recency_score: 0.04
  response_rate_score: 0.03
  github_score: 0.02
  verified_score: 0.02
  interview_completion_rate: 0.03
  # Family 6 (logistics)
  india_score: 0.03
  preferred_city_bonus: 0.02
  notice_period_score: 0.02
  # Family 7 (integrity, inverted — higher score = better)
  integrity_score: 0.05
  has_zero_gates: 0.03
